name: minsk_libraries
description: Кроссплатформенное приложение «Библиотеки Минска» (Android/iOS/Linux/Web)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Локализация
  intl: 0.19.0

  # Управление состоянием
  provider: ^6.1.1

  # Карта
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Локальное хранение
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # Сеть
  http: ^1.2.0

  # Навигация
  go_router: ^14.2.0

  # Уведомления (Toast / SnackBar для всех платформ)
  fluttertoast: ^8.2.6
  sqflite_common_ffi: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/libraries.json
